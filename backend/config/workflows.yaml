# HivePro CS Control Plane — Workflow Definitions
# Defines how events route from the orchestrator directly to specialist agents.

workflows:
  ticket_workflow:
    trigger_events:
      - jira_ticket_created
      - jira_ticket_updated
    description: "Handle incoming Jira tickets — triage, troubleshoot if needed, escalate if critical"
    steps:
      - agent: cso_orchestrator
        action: "Route ticket event to triage specialist"
        delegates_to: [triage_agent]
      - agent: triage_agent
        action: "Classify ticket, find similar past issues, suggest priority"
      - agent: troubleshooter
        action: "Diagnose root cause, suggest resolution steps"
        condition: "ticket severity >= high OR triage suggests investigation"
      - agent: escalation_summary
        action: "Evaluate escalation need, notify stakeholders"
        condition: "ticket severity = critical OR SLA breach imminent"

  health_workflow:
    trigger_events:
      - cron_health_check
      - manual_health_review
    description: "Daily health monitoring — compute scores, flag at-risk customers, generate alerts"
    steps:
      - agent: cso_orchestrator
        action: "Route health check to health monitor"
        delegates_to: [health_monitor]
      - agent: health_monitor
        action: "Calculate health scores, identify trends, flag anomalies"
      - agent: escalation_summary
        action: "Create alerts for at-risk customers"
        condition: "health_score < 40 OR score dropped > 15 points in 7 days"

  qbr_workflow:
    trigger_events:
      - cron_qbr_schedule
      - manual_qbr_request
    description: "Generate Quarterly Business Reviews — compile data, build narrative, create report"
    steps:
      - agent: cso_orchestrator
        action: "Route QBR generation to QBR specialist"
        delegates_to: [qbr_value]
      - agent: qbr_value
        action: "Compile QBR report — health trends, key incidents, recommendations"

  sow_workflow:
    trigger_events:
      - manual_sow_request
      - cron_sow_review
    description: "Manage Scope of Work — track deliverables, flag scope creep, update timelines"
    steps:
      - agent: cso_orchestrator
        action: "Route SOW task to SOW specialist"
        delegates_to: [sow_prerequisite]
      - agent: sow_prerequisite
        action: "Analyze SOW status, check deliverables, flag scope creep or delays"

  deployment_workflow:
    trigger_events:
      - jira_deployment_event
      - manual_deployment_review
    description: "Track deployment health — correlate with customer issues, assess risk"
    steps:
      - agent: cso_orchestrator
        action: "Route deployment event to deployment specialist"
        delegates_to: [deployment_intelligence]
      - agent: deployment_intelligence
        action: "Analyze deployment event, correlate with recent tickets, assess risk"
      - agent: troubleshooter
        action: "Check for related support tickets"
        condition: "deployment risk_level >= medium"
