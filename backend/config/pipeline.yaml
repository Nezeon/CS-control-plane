# HivePro CS Control Plane — Pipeline Configuration
# Defines pipeline stages that agents execute through.
# Stage types: perceive, retrieve, think, act, reflect, quality_gate, finalize

pipelines:
  orchestrator:
    description: "Routing pipeline for the Orchestrator (Naveen Kapoor)"
    max_rounds: 5
    stages:
      - name: "Event Analysis"
        type: perceive
        description: "Understand the incoming event — what happened, who is affected, urgency level"
      - name: "Context Gathering"
        type: retrieve
        description: "Pull relevant customer history, recent interactions, and organizational context"
      - name: "Routing Decision"
        type: think
        description: "Determine which specialist agent should handle this event"
      - name: "Specialist Execution"
        type: act
        description: "Route to the appropriate specialist agent and run their pipeline"
      - name: "Result Delivery"
        type: finalize
        description: "Return the specialist's output as the final result"

  specialist:
    description: "Execution pipeline for Specialist agents"
    max_rounds: 3
    stages:
      - name: "Task Perception"
        type: perceive
        description: "Understand the specific task from the Orchestrator"
      - name: "Memory Retrieval"
        type: retrieve
        description: "Recall similar past work from episodic memory, pull relevant knowledge"
      - name: "Analysis"
        type: think
        description: "Analyze the task using retrieved context, form initial conclusions"
      - name: "Execution"
        type: act
        description: "Execute the task — call tools, generate output, take actions"
      - name: "Self-Reflection"
        type: reflect
        description: "Evaluate own work quality, confidence level, and lessons learned"

  foundation:
    description: "Service pipeline for Foundation agents (Atlas)"
    max_rounds: 2
    stages:
      - name: "Request Parsing"
        type: perceive
        description: "Understand what context or memory is being requested"
      - name: "Data Retrieval"
        type: act
        description: "Fetch requested data from memory stores, knowledge pools, or databases"
