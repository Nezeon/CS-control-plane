# HivePro CS Control Plane — Organization Structure
# Defines the agent hierarchy: Orchestrator routes directly to specialists by lane.

organization:
  name: "HivePro CS Control Plane"
  description: "AI-powered Customer Success operations center with 10 agents"

  hierarchy:
    orchestrator:
      name: "Orchestrator"
      agents:
        - cso_orchestrator          # Naveen Kapoor
      description: "Routes events directly to the correct specialist agent based on event type and lane."

    specialists:
      name: "Specialists"
      agents:
        - triage_agent              # Kai Nakamura
        - troubleshooter             # Leo Petrov
        - escalation_summary         # Maya Santiago
        - health_monitor             # Dr. Aisha Okafor
        - qbr_value                  # Sofia Marquez
        - sow_prerequisite           # Ethan Brooks
        - deployment_intelligence    # Zara Kim
      description: "Execute specific CS tasks. Receive assignments from the Orchestrator, do the work, report back."

    foundation:
      name: "Foundation"
      agents:
        - customer_memory           # Atlas
      description: "Provides context and memory to all agents."

  lanes:
    support:
      specialists:
        - triage_agent              # Kai Nakamura
        - troubleshooter             # Leo Petrov
        - escalation_summary         # Maya Santiago
      focus: "Ticket handling, troubleshooting, escalation management"

    value:
      specialists:
        - health_monitor             # Dr. Aisha Okafor
        - qbr_value                  # Sofia Marquez
      focus: "Customer health, business reviews"

    delivery:
      specialists:
        - sow_prerequisite           # Ethan Brooks
        - deployment_intelligence    # Zara Kim
      focus: "Scope of work, deployment tracking"

  communication_rules:
    - "Orchestrator routes events directly to the correct specialist"
    - "Specialists report results back to the Orchestrator"
    - "Atlas (Foundation) serves all agents on request — any agent can query memory"
